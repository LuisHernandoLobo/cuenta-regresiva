<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta Regresiva - Retiro</title>

<style>
body {
    margin: 0;
    min-height: 100dvh; /* 🔥 clave para móviles */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-y: auto; /* 🔥 permite scroll */
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

/* CONTENEDOR PRINCIPAL */
.container {
    max-width: 600px;
    width: 100%;
}

/* TITULO */
h1 {
    font-size: 1.8em;
    margin-bottom: 20px;
}

/* CONTADOR */
.countdown {
    font-size: 2em;
    margin: 20px 0;
}

/* TEXTO INFERIOR */
.footer-text {
    font-size: 1em;
    margin-top: 30px;
    margin-bottom: 40px; /* 🔥 evita que se corte */
    opacity: 0.8;
}

/* RESPONSIVE EXTRA */
@media (max-width: 480px) {
    h1 {
        font-size: 1.5em;
    }

    .countdown {
        font-size: 1.5em;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Rumbo a mi retiro después de 38 años en CENS</h1>

    <div class="countdown" id="countdown">
        Cargando...
    </div>

    <div class="footer-text">
        Cada día es un paso más hacia una nueva etapa 🚀
    </div>
</div>

<script>
// FECHA OBJETIVO
const fechaRetiro = new Date("July 31, 2026 00:00:00").getTime();

const countdown = document.getElementById("countdown");

function actualizarContador() {
    const ahora = new Date().getTime();
    const diferencia = fechaRetiro - ahora;

    if (diferencia <= 0) {
        countdown.innerHTML = "🎉 ¡Llegó el gran día!";
        return;
    }

    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
    const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

    countdown.innerHTML = `
        ${dias} días <br>
        ${horas} horas ${minutos} min ${segundos} seg
    `;
}

setInterval(actualizarContador, 1000);
actualizarContador();
</script>

</body>
</html>
